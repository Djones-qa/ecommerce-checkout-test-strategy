name: Contract Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  consumer:
    name: Pact Consumer — Generate Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run consumer contract tests
        run: npm run pact:consumer

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: contract-tests/pacts/
          retention-days: 1

      - name: Publish pacts to Pact Broker
        if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          npx pact-broker publish contract-tests/pacts \
            --broker-base-url ${{ vars.PACT_BROKER_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }} \
            --consumer-app-version ${{ github.sha }} \
            --branch ${{ github.ref_name }} \
            --tag ${{ github.ref_name }}
        env:
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  provider:
    name: Pact Provider — Verify Contracts
    runs-on: ubuntu-latest
    needs: consumer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: contract-tests/pacts/

      - name: Run provider verification
        run: npm run pact:provider
        env:
          PAYMENTS_API_URL: ${{ vars.PAYMENTS_API_URL || 'http://localhost:3001' }}
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PROVIDER_API_TOKEN: ${{ secrets.PROVIDER_API_TOKEN }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}

  can-i-deploy:
    name: Can I Deploy? (Pact Broker check)
    runs-on: ubuntu-latest
    needs: provider
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - name: Check can-i-deploy
        run: |
          npx pact-broker can-i-deploy \
            --broker-base-url ${{ vars.PACT_BROKER_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }} \
            --pacticipant CheckoutUI \
            --version ${{ github.sha }} \
            --to-environment production
        env:
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
