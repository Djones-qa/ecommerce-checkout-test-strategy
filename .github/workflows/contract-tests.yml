name: Contract Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  consumer:
    name: Pact Consumer — Generate Contracts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Run consumer contract tests
        run: npm run pact:consumer

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-files
          path: contract-tests/pacts/
          retention-days: 1

      - name: Publish pacts to Pact Broker
        # Skips gracefully when broker credentials are not configured
        run: |
          if [ -z "$PACT_BROKER_TOKEN" ] || [ -z "$PACT_BROKER_URL" ]; then
            echo "ℹ️  PACT_BROKER_TOKEN or PACT_BROKER_URL not set — skipping publish (configure secrets to enable)"
            exit 0
          fi
          npx pact-broker publish contract-tests/pacts \
            --broker-base-url "$PACT_BROKER_URL" \
            --broker-token "$PACT_BROKER_TOKEN" \
            --consumer-app-version "${{ github.sha }}" \
            --branch "${{ github.ref_name }}" \
            --tag "${{ github.ref_name }}"
        env:
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}

  provider:
    name: Pact Provider — Verify Contracts
    runs-on: ubuntu-latest
    needs: consumer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-files
          path: contract-tests/pacts/

      - name: Run provider verification
        run: npm run pact:provider
        env:
          PAYMENTS_API_URL: ${{ vars.PAYMENTS_API_URL || 'http://localhost:3001' }}
          PACT_BROKER_URL: ${{ vars.PACT_BROKER_URL || '' }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN || '' }}
          PROVIDER_API_TOKEN: ${{ secrets.PROVIDER_API_TOKEN || 'test-token' }}
          GIT_SHA: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref_name }}
