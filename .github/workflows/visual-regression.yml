name: Visual Regression

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main, develop]

jobs:
  visual:
    name: Percy Visual Regression
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Percy visual tests
        run: |
          if [ -z "$PERCY_TOKEN" ]; then
            echo "ℹ️  PERCY_TOKEN not configured — skipping visual regression"
            echo "   Add PERCY_TOKEN as a repository secret to enable Percy snapshots"
            exit 0
          fi
          npx percy exec -- npx playwright test visual-tests/
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
          BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:3000' }}

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-visual-report
          path: test-results/visual-report
          retention-days: 7
