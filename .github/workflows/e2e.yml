name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cypress:
    name: Cypress (${{ matrix.browser }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox, edge]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Cypress E2E (${{ matrix.browser }})
        uses: cypress-io/github-action@v6
        with:
          browser: ${{ matrix.browser }}
          wait-on: ${{ vars.CYPRESS_BASE_URL || 'http://localhost:3000' }}
          wait-on-timeout: 60
          record: ${{ secrets.CYPRESS_RECORD_KEY != '' }}
          parallel: false
        env:
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL || 'http://localhost:3000' }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          API_BASE_URL: ${{ vars.API_BASE_URL }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots-${{ matrix.browser }}
          path: cypress/screenshots
          retention-days: 7

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos-${{ matrix.browser }}
          path: cypress/videos
          retention-days: 7

  e2e-summary:
    name: E2E Summary
    runs-on: ubuntu-latest
    needs: cypress
    if: always()
    steps:
      - name: Check E2E results
        run: |
          if [ "${{ needs.cypress.result }}" != "success" ]; then
            echo "❌ E2E tests failed on one or more browsers"
            exit 1
          fi
          echo "✅ E2E tests passed on all browsers (Chrome, Firefox, Edge)"
